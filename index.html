  apiKey: "AIzaSyBVJu34eNs5_h5o33tUdPqyuxOx-SU-NGc",
  authDomain: "grap-377f7.firebaseapp.com",
  projectId: "grap-377f7",
  storageBucket: "grap-377f7.firebasestorage.app",
  messagingSenderId: "523295120957",

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --accent:#c9a84c; --accent2:#e8c96a;
  --bg:#0f0d0b; --surface:#1a1714; --surface2:#231f1b; --surface3:#2e2924;
  --border:#3a332c; --cream:#f5ead8; --text:#f0e6d3; --text2:#b0a090; --text3:#6b5f52;
  --red:#e05a4e; --green:#5aab7a; --blue:#5a8fc9; --orange:#e8894e;
  --r:12px; --sh:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
h1,h2,h3{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* TOAST */
#toast-wrap{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border);border-left:4px solid var(--accent);padding:10px 14px;border-radius:8px;font-size:13px;max-width:300px;animation:tslide .3s ease}
.toast.err{border-left-color:var(--red)}.toast.ok{border-left-color:var(--green)}.toast.info{border-left-color:var(--blue)}
@keyframes tslide{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-full{width:100%}
.btn-gold{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1000}
.btn-gold:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.1)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{filter:brightness(1.1)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:5px}

/* INPUTS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
select.inp option{background:var(--surface2)}
.input-row{display:flex;gap:8px}
.input-row .field{flex:1}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,#1a1208,#0f0d0b)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:390px;box-shadow:var(--sh)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:32px;color:var(--accent)}
.login-logo p{font-size:11px;color:var(--text3);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.login-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);border-radius:10px;padding:4px}
.login-tab{flex:1;padding:8px;text-align:center;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text3);transition:all .2s}
.login-tab.active{background:var(--surface3);color:var(--accent)}
.login-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}

/* APP */
#app-admin{display:none;min-height:100vh}
#app-driver{display:none;min-height:100vh}
#app-customer{display:none;min-height:100vh}

/* SIDEBAR — admin */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-size:20px;color:var(--accent)}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;color:var(--text2);transition:all .2s;border-left:3px solid transparent;font-size:13px;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent);border-left-color:var(--accent)}
.nav-icon{font-size:17px;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b6914);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#1a1000;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px}
.logout-btn:hover{color:var(--red)}
.main{margin-left:220px;padding:22px;min-height:100vh}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:20px}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99}

/* TOP NAV — driver/customer */
.top-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.top-nav-logo{font-size:20px;color:var(--accent);font-family:'Playfair Display',serif;flex:1}
.top-tab{padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1px solid transparent;transition:all .2s}
.top-tab.active{background:var(--surface2);color:var(--accent);border-color:var(--border)}
.sub-main{padding:20px;max-width:700px;margin:0 auto}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:24px;color:var(--cream)}
.ph-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:600;color:var(--cream);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}

/* TAGS */
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tag-gold{background:#2a2010;color:var(--accent);border:1px solid #4a3a18}
.tag-green{background:#0f2a1a;color:var(--green);border:1px solid #1a4a2a}
.tag-blue{background:#0f1e2a;color:var(--blue);border:1px solid #1a304a}
.tag-red{background:#2a0f0e;color:var(--red);border:1px solid #4a1e1a}
.tag-orange{background:#2a1a0e;color:var(--orange);border:1px solid #4a2a1a}
.tag-gray{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh)}
.modal-title{font-size:18px;color:var(--cream);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px}
.modal-close:hover{color:var(--red)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);border:1px solid var(--border);transition:all .2s}
.tab.active{background:var(--accent);color:#1a1000;border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.stat-val{font-size:26px;font-weight:700;color:var(--cream);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* TRIP CARD */
.trip-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.trip-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.trip-route .from{color:var(--green)}
.trip-route .to{color:var(--red)}
.trip-route div{margin:3px 0;font-size:13px}
.trip-meta{font-size:11px;color:var(--text3);margin-top:7px}

/* ONLINE TOGGLE */
.online-toggle{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.toggle-dot{width:10px;height:10px;border-radius:50%;background:var(--text3);transition:all .3s;flex-shrink:0}
.toggle-dot.on{background:var(--green);box-shadow:0 0 8px rgba(90,171,122,.5)}

/* MISC */
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:13px}
.divider{height:1px;background:var(--border);margin:12px 0}
.badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;font-weight:700;margin-left:4px}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .backdrop.show{display:block}
  .hamburger{display:flex;align-items:center}
  .main{margin-left:0;padding:14px;padding-top:52px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .input-row{flex-direction:column}
  .ph-title{font-size:19px}
  .login-box{width:100%;max-width:390px}
  .top-nav{flex-wrap:wrap;gap:6px}
}
</style>
</head>
<body>
<div id="toast-wrap"></div>

<!-- ═══════════════════════════════
          MÀN HÌNH ĐĂNG NHẬP
════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>🚗 GrapApp</h1>
      <p>Nền tảng đặt xe</p>
    </div>

    <div class="login-tabs">

        <div class="field"><label>Mật khẩu</label><input class="inp" id="cp-login" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doCustomerLogin()"></div>
        <button class="btn btn-gold btn-full" onclick="doCustomerLogin()">Đăng nhập</button>

        <div class="field"><label>Số điện thoại</label><input class="inp" id="cr-phone" placeholder="0912345678"></div>
        <div class="field"><label>Email</label><input class="inp" id="cr-email" type="email" placeholder="email@gmail.com"></div>
        <div class="field"><label>Mật khẩu</label><input class="inp" id="cr-pass" type="password" placeholder="Tối thiểu 6 ký tự"></div>
        <button class="btn btn-gold btn-full" onclick="doRegister()">Tạo tài khoản</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════
          APP ADMIN
════════════════════════════════ -->

  <nav class="sidebar" id="sidebar">

          APP KHÁCH HÀNG
════════════════════════════════ -->
<div id="app-customer">
  <div class="top-nav">
    <div class="top-nav-logo">🚗 GrapApp</div>
    <div style="display:flex;gap:4px">
      <div class="top-tab active" id="ctab-book"    onclick="customerPage('book')">Đặt xe</div>

<script>
// ════════════════════════════════════════
//   CONSTANTS & STATE
// ════════════════════════════════════════
const ADMIN_EMAIL   = 'Admin@myapp.com';
const DRIVER_DOMAIN = '@myapp.com';
const API_KEY       = 'AIzaSyBVJu34eNs5_h5o33tUdPqyuxOx-SU-NGc';

let currentUser    = null;
let currentRole    = null;   // 'admin' | 'driver' | 'customer'
let currentProfile = null;
let driverOnline   = false;
let appConfig      = { name:'GrapApp', fareBase:10000, farePerKm:8000 };

let unsubDisabled  = null;
let unsubPending   = null;
let unsubActive    = null;
let unsubCurrent   = null;

// ════════════════════════════════════════
//   UTILS
// ════════════════════════════════════════
function $(id){ return document.getElementById(id); }

function toast(msg, type='info'){
  const w = $('toast-wrap');
  const d = document.createElement('div');
  d.className = `toast ${type}`;
  d.textContent = msg;
  w.appendChild(d);
  setTimeout(()=>d.remove(), 3500);
}

function fmtMoney(n){
  if(!n && n!==0) return '—';
  return Number(n).toLocaleString('vi-VN') + 'đ';
}

function fmtDate(ts){
  if(!ts) return '—';
  const d = ts?.toDate ? ts.toDate() : (ts instanceof Date ? ts : new Date(ts));
  return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
}

function statusTag(s){
  const map = {
    pending:   '<span class="tag tag-orange">⏳ Chờ tài xế</span>',
    accepted:  '<span class="tag tag-blue">✅ Đã nhận</span>',
    onride:    '<span class="tag tag-gold">🚗 Đang chạy</span>',
    completed: '<span class="tag tag-green">✔ Hoàn thành</span>',
    cancelled: '<span class="tag tag-red">✕ Đã huỷ</span>',
  };
  return map[s] || `<span class="tag tag-gray">${s}</span>`;
}

function closeModal(id){ const el=$(id); if(el) el.remove(); }

function cleanupListeners(){
  [unsubDisabled, unsubPending, unsubActive, unsubCurrent].forEach(u=>{ if(u) u(); });
  unsubDisabled = unsubPending = unsubActive = unsubCurrent = null;
}

async function doLogin(){
  let u = $('lu').value.trim().toLowerCase();
  const p = $('lp').value;
  if(!u||!p) return toast('Nhập đầy đủ thông tin','err');
  if(!u.includes('@')) u += DRIVER_DOMAIN;
  try{
    await window._firebase.signInWithEmailAndPassword(window._auth, u, p);
  } catch(e){ toast('Sai tài khoản hoặc mật khẩu','err'); }
}

async function doCustomerLogin(){
  const u = $('ce-login').value.trim();
  const p = $('cp-login').value;
  if(!u||!p) return toast('Nhập đầy đủ thông tin','err');
  try{
    await window._firebase.signInWithEmailAndPassword(window._auth, u, p);
  } catch(e){ toast('Sai email hoặc mật khẩu','err'); }
}

async function doRegister(){
  const name  = $('cr-name').value.trim();
  const phone = $('cr-phone').value.trim();
  const email = $('cr-email').value.trim();
  const pass  = $('cr-pass').value;
  if(!name||!email||!pass) return toast('Vui lòng điền đầy đủ','err');
  if(pass.length < 6)      return toast('Mật khẩu tối thiểu 6 ký tự','err');
  try{
    const { createUserWithEmailAndPassword, doc, setDoc, serverTimestamp } = window._firebase;
    const cred = await createUserWithEmailAndPassword(window._auth, email, pass);
    await setDoc(doc(window._db,'customers',cred.user.uid),{
      email: email.toLowerCase(), fullName: name, phone: phone||'',
      active: true, createdAt: serverTimestamp()
    });
    toast('🎉 Đăng ký thành công! Chào mừng '+name,'ok');
  } catch(e){
    if(e.code==='auth/email-already-in-use') toast('Email đã được sử dụng','err');
    else toast('Lỗi: '+e.message,'err');
  }
}

async function doLogout(){
  // Set driver offline trước khi logout
  if(currentRole==='driver' && currentProfile?.id){
    try{ await window._firebase.updateDoc(window._firebase.doc(window._db,'drivers',currentProfile.id),{online:false}); }catch(e){}
  }
  cleanupListeners();
  await window._firebase.signOut(window._auth);
  $('lp').value=''; $('lu').value=''; $('lu-suffix').textContent='';
}

function hideAll(){
  ['login-screen','app-admin','app-driver','app-customer'].forEach(id=>{

}

}

//   FIREBASE READY
// ════════════════════════════════════════
window.addEventListener('firebase-ready', ()=>{
  loadAppConfig();
  window._firebase.onAuthStateChanged(window._auth, async u => {
    if(u){
      currentUser = u;
      if(u.email === ADMIN_EMAIL){
        currentRole = 'admin';
        showAdminApp();
      } else {
        // Kiểm tra tài xế
        const dSnap = await window._firebase.getDoc(window._firebase.doc(window._db,'drivers',u.uid));
        if(dSnap.exists()){
          const data = dSnap.data();
          if(data.active===false){
            toast('🚫 Tài khoản bị vô hiệu hoá!','err');
            await window._firebase.signOut(window._auth); return;
          }
          currentRole    = 'driver';
          currentProfile = { id: u.uid, ...data };
          driverOnline   = data.online || false;
          startDisabledWatcher('drivers', u.uid);
          showDriverApp();
        } else {
          // Kiểm tra hoặc tạo khách hàng
          const cRef  = window._firebase.doc(window._db,'customers',u.uid);
          let cSnap   = await window._firebase.getDoc(cRef);
          if(!cSnap.exists()){
            await window._firebase.setDoc(cRef,{
              email: u.email, fullName: u.email.split('@')[0], phone:'',
              active: true, createdAt: window._firebase.serverTimestamp()
            });
            cSnap = await window._firebase.getDoc(cRef);
          }
          const data = cSnap.data();
          if(data.active===false){
            toast('🚫 Tài khoản bị vô hiệu hoá!','err');
            await window._firebase.signOut(window._auth); return;
          }
          currentRole    = 'customer';
          currentProfile = { id: u.uid, ...data };
          startDisabledWatcher('customers', u.uid);
          showCustomerApp();
        }
      }
    } else {
      currentUser=null; currentRole=null; currentProfile=null;
      cleanupListeners();
      showLogin();
    }
  });
});

async function loadAppConfig(){
  try{
    const snap = await window._firebase.getDoc(window._firebase.doc(window._db,'config','app'));
    if(snap.exists()) appConfig = { ...appConfig, ...snap.data() };
  } catch(e){}
}

// Realtime watcher — khoá tài khoản → kick ngay
function startDisabledWatcher(coll, uid){
  if(unsubDisabled){ unsubDisabled(); unsubDisabled=null; }
  const ref = window._firebase.doc(window._db, coll, uid);
  unsubDisabled = window._firebase.onSnapshot(ref, snap=>{
    if(snap.exists() && snap.data().active===false){
      toast('🚫 Tài khoản của bạn vừa bị vô hiệu hoá!','err');
      setTimeout(()=>window._firebase.signOut(window._auth), 1200);
    }
  });
}

function adminPage(page){
  document.querySelectorAll('#app-admin .nav-item').forEach(el=>el.classList.remove('active'));
  const nav=$('nav-'+page); if(nav) nav.classList.add('active');
  if(window.innerWidth<=768){ $('sidebar').classList.remove('open'); $('backdrop').classList.remove('show'); }
  switch(page){
    case 'dashboard': renderDashboard(); break;
    case 'drivers':   renderDrivers();   break;
    case 'customers': renderCustomers(); break;
    case 'trips':     renderAdminTrips(); break;
    case 'accounts':  renderAccounts();  break;
    case 'settings':  renderSettings();  break;
  }
}

// ─── DASHBOARD ───
async function renderDashboard(){
  $('admin-main').innerHTML='<div class="spinner"></div>';
  try{
    const { collection, getDocs } = window._firebase;
    const [dSnap, cSnap, tSnap] = await Promise.all([
      getDocs(collection(window._db,'drivers')),
      getDocs(collection(window._db,'customers')),
      getDocs(collection(window._db,'trips')),
    ]);
    const drivers   = dSnap.docs.map(d=>d.data());
    const trips     = tSnap.docs.map(d=>d.data());
    const today     = new Date(); today.setHours(0,0,0,0);
    const todayT    = trips.filter(t=>{ const d=t.createdAt?.toDate?t.createdAt.toDate():new Date(0); return d>=today; });
    const revenue   = trips.filter(t=>t.status==='completed').reduce((s,t)=>s+(t.fare||0),0);
    const online    = drivers.filter(d=>d.online).length;
    const pending   = trips.filter(t=>t.status==='pending').length;
    const recent    = tSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).slice(0,10);

    $('admin-main').innerHTML=`
      <div class="ph"><div><div class="ph-title">Dashboard</div><div class="ph-sub">Tổng quan hệ thống</div></div>
        <button class="btn btn-ghost btn-sm" onclick="renderDashboard()">🔄 Làm mới</button></div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-label">Tài xế online</div><div class="stat-val" style="color:var(--green)">${online}</div><div class="stat-sub">/ ${drivers.length} tổng</div></div>
        <div class="stat"><div class="stat-label">Chuyến hôm nay</div><div class="stat-val">${todayT.length}</div><div class="stat-sub">chuyến</div></div>
        <div class="stat"><div class="stat-label">Đang chờ</div><div class="stat-val" style="color:var(--orange)">${pending}</div><div class="stat-sub">chờ tài xế</div></div>
        <div class="stat"><div class="stat-label">Doanh thu</div><div class="stat-val" style="color:var(--accent);font-size:18px">${fmtMoney(revenue)}</div><div class="stat-sub">tổng cộng</div></div>
        <div class="stat"><div class="stat-label">Khách hàng</div><div class="stat-val">${cSnap.size}</div><div class="stat-sub">tài khoản</div></div>
        <div class="stat"><div class="stat-label">Tổng chuyến</div><div class="stat-val">${trips.length}</div><div class="stat-sub">tất cả</div></div>
      </div>
      <div class="card">
        <div class="card-title">Chuyến xe gần đây</div>
        ${recent.length?`<div class="tbl-wrap"><table>
          <thead><tr><th>Thời gian</th><th>Khách</th><th>Đón</th><th>Đến</th><th>Tài xế</th><th>Cước</th><th>Trạng thái</th></tr></thead>
          <tbody>${recent.map(t=>`<tr>
            <td style="color:var(--text3);font-size:12px;white-space:nowrap">${fmtDate(t.createdAt)}</td>
            <td>${t.customerName||'—'}</td>
            <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.pickup||''}</td>
            <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.dropoff||''}</td>
            <td>${t.driverName||'<span style="color:var(--text3)">Chưa có</span>'}</td>
            <td style="color:var(--accent)">${t.fare?fmtMoney(t.fare):'—'}</td>
            <td>${statusTag(t.status)}</td>
          </tr>`).join('')}</tbody>
        </table></div>`:'<div class="empty">Chưa có chuyến nào</div>'}
      </div>`;
  } catch(e){ $('admin-main').innerHTML=`<div class="empty">Lỗi: ${e.message}</div>`; }
}

  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="driver-modal" onclick="if(event.target.id==='driver-modal')closeModal('driver-modal')">
      <div class="modal">
        <div class="modal-title">${isEdit?'Sửa tài xế':'Thêm tài xế mới'}<button class="modal-close" onclick="closeModal('driver-modal')">✕</button></div>
        <div class="field"><label>Họ tên</label><input class="inp" id="df-name" value="${driver?.fullName||''}"></div>
        <div class="input-row">
          <div class="field"><label>Email / Username</label>
            <div style="position:relative">
              <input class="inp" id="df-email" value="${driver?driver.email.replace(DRIVER_DOMAIN,''):''}" ${isEdit?'readonly style="opacity:.6"':''} oninput="updateDfSuffix()">
              <span id="df-suffix" class="login-suffix">${isEdit||driver?.email.includes('@')?'':DRIVER_DOMAIN}</span>
            </div>
          </div>
          <div class="field"><label>SĐT</label><input class="inp" id="df-phone" value="${driver?.phone||''}"></div>
        </div>
        <div class="input-row">
          <div class="field"><label>Loại xe</label><input class="inp" id="df-vehicle" value="${driver?.vehicle||''}" placeholder="Honda Wave, Vios..."></div>
          <div class="field"><label>Biển số</label><input class="inp" id="df-plate" value="${driver?.licensePlate||''}" placeholder="51A-123.45"></div>
        </div>
        ${!isEdit?`<div class="field"><label>Mật khẩu</label><input class="inp" id="df-pass" type="password" placeholder="Tối thiểu 6 ký tự"></div>`:''}
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('driver-modal')">Huỷ</button>
          <button class="btn btn-gold" onclick="${isEdit?`saveDriver('${driver.id}')`:' createDriver()'}">${isEdit?'Lưu thay đổi':'Tạo tài xế'}</button>
        </div>
      </div>
    </div>`);
}

function updateDfSuffix(){
  const v=$('df-email')?.value.trim();
  const s=$('df-suffix'); if(s) s.textContent=(!v||v.includes('@'))?'':DRIVER_DOMAIN;
}

async function createDriver(){
  let email   = $('df-email').value.trim().toLowerCase();
  const name  = $('df-name').value.trim();
  const phone = $('df-phone').value.trim();
  const veh   = $('df-vehicle').value.trim();
  const plate = $('df-plate').value.trim();
  const pass  = $('df-pass').value;
  if(!email||!name||!pass) return toast('Vui lòng điền đầy đủ','err');
  if(pass.length<6)        return toast('Mật khẩu tối thiểu 6 ký tự','err');
  if(!email.includes('@')) email += DRIVER_DOMAIN;
  try{
    // Dùng REST API để tạo user mà không logout admin
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password:pass, returnSecureToken:true })
    });
    const data = await res.json();
    if(data.error) return toast('Lỗi tạo tài khoản: '+data.error.message,'err');
    const { doc, setDoc, serverTimestamp } = window._firebase;
    await setDoc(doc(window._db,'drivers',data.localId),{
      email, fullName:name, phone, vehicle:veh, licensePlate:plate,
      active:true, online:false, createdAt:serverTimestamp(), uid:data.localId
    });
    closeModal('driver-modal');
    toast('✅ Đã tạo tài xế '+name,'ok');
    renderDrivers();
  } catch(e){ toast('Lỗi: '+e.message,'err'); }
}

async function saveDriver(id){
  const name  = $('df-name').value.trim();
  const phone = $('df-phone').value.trim();
  const veh   = $('df-vehicle').value.trim();
  const plate = $('df-plate').value.trim();
  if(!name) return toast('Nhập họ tên','err');
  await window._firebase.updateDoc(window._firebase.doc(window._db,'drivers',id),{fullName:name,phone,vehicle:veh,licensePlate:plate});
  closeModal('driver-modal'); toast('Đã cập nhật','ok'); renderDrivers();
}

function listenPendingTrips(){

      <div class="trip-card" style="border-left:3px solid var(--orange)">

async function toggleOnline(){
  driverOnline = !driverOnline;

  const dot=$('dot-online'), btn=$('btn-online'), lbl=$('online-label'), sub=$('online-sub');

  if(btn){ btn.textContent=driverOnline?'Đi offline':'Bật online'; btn.className=`btn ${driverOnline?'btn-outline':'btn-green'}`; }
  if(lbl) lbl.textContent=driverOnline?'Đang Online':'Đang Offline';
  if(sub) sub.textContent=driverOnline?'Có thể nhận chuyến':'Bật để nhận chuyến mới';
  toast(driverOnline?'🟢 Bạn đang online':'⚫ Đã offline','info');
  listenPendingTrips();
}

  if(!name)            return toast('Nhập họ tên','err');
  if(!phone)           return toast('Nhập số điện thoại','err');
  if(!pickup||!dropoff)return toast('Nhập điểm đón và điểm đến','err');
  const mult=type==='Xe máy'?1:type==='Xe 4 chỗ'?1.5:2;
  const fare=dist>0?Math.round((appConfig.fareBase+appConfig.farePerKm*dist)*mult):null;
  try{
    await window._firebase.addDoc(window._firebase.collection(window._db,'trips'),{
      customerId:    currentProfile.id,
      customerName:  currentProfile.fullName,
      customerPhone: currentProfile.phone||'',
      passengerName: name,
      passengerPhone:phone,
      pickup, dropoff, vehicleType:type,
      distance:dist||null, fare, note:note||'',
      status:'pending',
      createdAt:window._firebase.serverTimestamp(),
      driverId:null, driverName:null, driverPhone:null
    });
    // Lưu nơi đón cuối để điền lại lần sau
    await window._firebase.updateDoc(window._firebase.doc(window._db,'customers',currentProfile.id),{lastPickup:pickup});
    toast('🎉 Đặt xe thành công! Đang chờ xác nhận...','ok');
  } catch(e){ toast('Lỗi: '+e.message,'err'); }
}

// Huỷ tự do khi còn pending (chưa có tài xế nhận)
async function customerCancelFree(id){
  if(!confirm('Huỷ chuyến này?')) return;
  await window._firebase.updateDoc(window._firebase.doc(window._db,'trips',id),{status:'cancelled'});
  toast('Đã huỷ chuyến','ok');
}

// Huỷ khi đã được xác nhận → cần nhập đúng SĐT
function openCancelVerify(tripId, correctPhone){
  document.body.insertAdjacentHTML('beforeend',`
    <div class="modal-overlay" id="cancel-modal" onclick="if(event.target.id==='cancel-modal')closeModal('cancel-modal')">
      <div class="modal" style="max-width:360px">
        <div class="modal-title">🔒 Xác nhận huỷ chuyến<button class="modal-close" onclick="closeModal('cancel-modal')">✕</button></div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px">
          Chuyến đã được tài xế xác nhận.<br>Nhập lại <strong>số điện thoại</strong> đã đặt để huỷ.
        </div>
        <div class="field">
          <label>Số điện thoại đặt xe</label>
          <input class="inp" id="cancel-phone" type="tel" placeholder="Nhập SĐT..." onkeydown="if(event.key==='Enter')doVerifyCancel('${tripId}','${correctPhone}')">
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('cancel-modal')">Đóng</button>
          <button class="btn btn-red" onclick="doVerifyCancel('${tripId}','${correctPhone}')">Xác nhận huỷ</button>
        </div>
      </div>
    </div>`);
  setTimeout(()=>{ const el=$('cancel-phone'); if(el) el.focus(); }, 100);
}

async function doVerifyCancel(tripId, correctPhone){
  const entered = $('cancel-phone').value.trim();
  if(!entered) return toast('Nhập số điện thoại','err');
  // So sánh bỏ dấu cách và ký tự đặc biệt
  const clean = s => s.replace(/[\s\-\+\.]/g,'');
  if(clean(entered) !== clean(correctPhone)){
    toast('❌ Số điện thoại không khớp!','err'); return;
  }
  await window._firebase.updateDoc(window._firebase.doc(window._db,'trips',tripId),{
    status:'cancelled', cancelledAt:window._firebase.serverTimestamp(), cancelReason:'Khách huỷ sau xác nhận'
  });
  closeModal('cancel-modal');
  toast('Đã huỷ chuyến','ok');
}

async function renderCustomerTrips(){
  $('customer-main').innerHTML='<div class="spinner"></div>';
  try{
    const { collection, query, where, getDocs } = window._firebase;
    const q    = query(collection(window._db,'trips'), where('customerId','==',currentProfile.id));
    const snap = await getDocs(q);
    const list = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    $('customer-main').innerHTML=`
      <div class="ph"><div><div class="ph-title">Chuyến của tôi</div><div class="ph-sub">${list.length} chuyến</div></div></div>
      ${list.map(t=>`
        <div class="trip-card" style="border-left:3px solid ${t.status==='completed'?'var(--green)':t.status==='cancelled'?'var(--red)':t.status==='onride'?'var(--accent)':'var(--orange)'}">
          <div class="trip-card-head"><span style="font-size:12px;color:var(--text3)">${fmtDate(t.createdAt)}</span>${statusTag(t.status)}</div>
          <div class="trip-route"><div>📍 <span class="from">${t.pickup}</span></div><div>🏁 <span class="to">${t.dropoff}</span></div></div>
          <div class="trip-meta">🚗 ${t.vehicleType||'—'} · 💰 ${t.fare?fmtMoney(t.fare):'—'} · 🧑 ${t.driverName||'Chưa có tài xế'}</div>
        </div>`).join('')||'<div class="empty">Chưa có chuyến nào</div>'}`;
  } catch(e){ $('customer-main').innerHTML=`<div class="empty">Lỗi: ${e.message}</div>`; }
}

function renderCustomerProfile(){
  const p=currentProfile;
  $('customer-main').innerHTML=`
    <div class="ph"><div><div class="ph-title">Hồ sơ</div></div></div>
    <div class="card" style="max-width:460px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
        <div class="avatar" style="width:50px;height:50px;font-size:20px">${(p?.fullName||'K')[0].toUpperCase()}</div>
        <div><div style="font-size:18px;font-weight:700;color:var(--cream)">${p?.fullName||'—'}</div>
             <div style="font-size:12px;color:var(--text3)">${p?.email||''}</div></div>
      </div>
      <div class="divider"></div>
      <div style="display:grid;gap:10px;margin:14px 0;font-size:13px">
        <div style="display:flex;justify-content:space-between"><span style="color:var(--text3)">SĐT</span><span>${p?.phone||'—'}</span></div>
      </div>
      <div class="divider"></div>
      <div style="margin-top:14px">
        <div style="font-size:13px;font-weight:600;color:var(--cream);margin-bottom:10px">Cập nhật thông tin</div>
        <div class="field"><label>Họ tên</label><input class="inp" id="cu-name" value="${p?.fullName||''}"></div>
        <div class="field"><label>SĐT</label><input class="inp" id="cu-phone" value="${p?.phone||''}"></div>
        <button class="btn btn-gold btn-sm" onclick="saveCustomerProfile()">Lưu</button>
      </div>
      <div class="divider"></div>
      <div style="margin-top:14px">
        <div style="font-size:13px;font-weight:600;color:var(--cream);margin-bottom:10px">Đổi mật khẩu</div>
        <div class="field"><label>Mật khẩu mới</label><input class="inp" id="cu-pw" type="password" placeholder="Tối thiểu 6 ký tự"></div>
        <button class="btn btn-outline btn-sm" onclick="changeCustomerPw()">Đổi mật khẩu</button>
      </div>
    </div>`;
}

async function saveCustomerProfile(){
  const name=$('cu-name').value.trim(), phone=$('cu-phone').value.trim();
  if(!name) return toast('Nhập họ tên','err');
  await window._firebase.updateDoc(window._firebase.doc(window._db,'customers',currentProfile.id),{fullName:name,phone});
  currentProfile.fullName=name; currentProfile.phone=phone;
  toast('Đã cập nhật hồ sơ','ok');
}

async function changeCustomerPw(){
  const pw=$('cu-pw').value;
  if(!pw||pw.length<6) return toast('Tối thiểu 6 ký tự','err');
  try{ await window._firebase.updatePassword(window._auth.currentUser,pw); toast('Đã đổi mật khẩu','ok'); $('cu-pw').value=''; }
  catch(e){ toast('Lỗi: '+e.message,'err'); }
}
</script>
